<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="header">
      <h1>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <title>library</title>
          <path
            d="M12,8A3,3 0 0,0 15,5A3,3 0 0,0 12,2A3,3 0 0,0 9,5A3,3 0 0,0 12,8M12,11.54C9.64,9.35 6.5,8 3,8V19C6.5,19 9.64,20.35 12,22.54C14.36,20.35 17.5,19 21,19V8C17.5,8 14.36,9.35 12,11.54Z"
          />
        </svg>
        My Library
      </h1>
      <button type="button" id="add-book">Add book</button>
    </div>
    <div class="books"></div>
    <dialog id="add-book-dialog">
      <form action="" method="post">
        <div>
          <label for="title">Title</label>
          <input type="text" id="title" name="title" />
        </div>
        <div>
          <label for="author">Author</label>
          <input type="text" id="author" name="author" />
        </div>
        <div>
          <label for="pages">Pages</label>
          <input type="number" id="pages" name="pages" />
        </div>
        <div>
          <input type="checkbox" id="read" name="read" value="read" />
          <label for="read">Have you read this book yet?</label>
        </div>
        <button type="button" id="close-modal">Cancel</button>
      </form>
    </dialog>
  </body>
</html>
